<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="stylesheet" href="style.css" />

  <nav class="menu">

  <body>
    <div class="heroimage">
      <img
        src="movieimage.jpg"
        alt="this needs to be personalized and replaced"
      />
      <h1>
        Letter squared lets you keep track of every film WE’VE seen, so you can
        instantly view our opinion on a move WE just saw.
      </h1>
      <h2>feel free to contact us at :</h2>
      <h1>letterSQUARED@fake.com</h1>
      <h1>(+1) 000-000-0000</h1>
      <div class="signup-container">
        <input type="text" id="signupName" placeholder="Your Name" />
        <input type="email" id="signupEmail" placeholder="Your Email" />
        <button onclick="signUp()">Sign Up for Mailing List</button>
      </div>
    </div>
    <div class="space_content"></div>

    <footer>
    <p>Author: lettersquared team</p>
  </footer>
  </body>
  <div id="modal" style="display: none;">
    <div class="modal-content">
      <p id="modalMessage" style="color: black;"></p>
      <button onclick="closeModal()">Close</button>
    </div>
  </div>
  <script>
    function signUp() {
      const name = document.getElementById("signupName").value;
      const email = document.getElementById("signupEmail").value;
      if (name && email) {
        document.getElementById("modalMessage").textContent = "Thanks for caring!";
        document.getElementById("modal").style.display = "flex";
      } else {
        document.getElementById("modalMessage").textContent = "Please fill in both name and email.";
        document.getElementById("modal").style.display = "flex";
      }
    }
    function closeModal() {
      document.getElementById("modal").style.display = "none";
    }
  </script>
</html>
