  <body>
    <div class="heroimage"></div>
    <div class="review_1_quote">
      <h1 id="movieTitle">movie name</h1>
      <p id="movieReview">movie review</p>
      <h3 id="movieReviewer">person who reviewed</h3>
    </div>
    <script>
      function displayReview() {
        const selectedMovie = localStorage.getItem("selectedMovie");

        if (selectedMovie) {
          const review = reviewers.find(
            (r) => r.movie.toLowerCase() === selectedMovie.toLowerCase()
          );

          if (review) {
            document.getElementById("movieTitle").textContent = review.movie;
            document.getElementById("movieReview").textContent = review.review;
            document.getElementById("movieReviewer").textContent =
              "- " + review.reviewer;
          } else {
            document.getElementById("movieTitle").textContent = selectedMovie;
            document.getElementById("movieReview").textContent =
              "No review available for this movie yet.";
            document.getElementById("movieReviewer").textContent = "";
          }
        }
      }

      // Load review when page loads
      displayReview();
    </script>
  </body>
